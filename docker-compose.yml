services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=presupuesto;Username=postgres;Password=postgres
      - Jwt__Secret=tu_secret_de_al_menos_32_caracteres_aqui
      - Auth__Email=tu@email.com
      - Auth__PasswordHash=bcrypt_hash_aqui
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: presupuesto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d presupuesto"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata:
